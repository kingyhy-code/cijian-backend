server:
  port: 8083

spring:
  application:
    name: cijian-interaction
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yml
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/cijian?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:1230}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: cijian-interaction-producer

logging:
  level:
    com.cijian.interaction: info
  file:
    name: logs/${spring.application.name}.log
spring.cloud.nacos.discovery.ip: 127.0.0.1

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: cijian-tx-group
  service:
    vgroup-mapping:
      cijian-tx-group: default
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      group: SEATA_GROUP
      namespace: ""
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      group: SEATA_GROUP
      namespace: ""

springdoc:
  swagger-ui:
    path: /swagger-ui.html
