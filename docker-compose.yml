services:
  redis:
    image: redis:7-alpine
    container_name: cijian-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: cijian-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"

  mysql:
    image: mysql:8.3
    container_name: cijian-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: cijian
      MYSQL_USER: ${MYSQL_USER:-cijian}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cijian123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./Dump20260503.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: cijian-rocketmq-namesrv
    restart: unless-stopped
    environment:
      JAVA_OPT_EXT: -Xms256m -Xmx256m
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: cijian-rocketmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPT_EXT: -Xms512m -Xmx512m
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "10911:10911"
      - "10909:10909"
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf

  elasticsearch:
    image: elasticsearch:8.13.2
    container_name: cijian-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 20

  seata:
    image: seataio/seata-server:1.8.0
    container_name: cijian-seata
    restart: unless-stopped
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      SEATA_IP: seata
      SEATA_PORT: 8091

volumes:
  mysql-data:
  es-data:
